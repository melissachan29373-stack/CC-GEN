<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | CC-GEN</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/themes.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            transition: background 0.3s, color 0.3s;
        }
        .error-container {
            max-width: 480px;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 900;
            line-height: 1;
            background: var(--gradient-primary, linear-gradient(135deg, #6366f1, #8b5cf6));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }
        .error-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            color: var(--text-primary);
        }
        .error-message {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 2rem;
            background: var(--gradient-primary, linear-gradient(135deg, #6366f1, #8b5cf6));
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: opacity 0.2s, transform 0.2s;
        }
        .back-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        .card-animation {
            margin: 2rem auto;
            width: 200px;
            height: 120px;
            background: var(--gradient-primary, linear-gradient(135deg, #374151, #6b7280));
            border-radius: 12px;
            position: relative;
            animation: float 3s ease-in-out infinite;
            box-shadow: var(--shadow-lg, 0 10px 30px rgba(0,0,0,0.3));
        }
        .card-animation::before {
            content: '?';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            font-weight: bold;
            color: rgba(255,255,255,0.3);
        }
        .card-animation .chip {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 35px;
            height: 25px;
            background: linear-gradient(135deg, #d4a843, #c4972e);
            border-radius: 4px;
        }
        .theme-toggle {
            position: fixed;
            top: 1rem;
            right: 1rem;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1px solid var(--border-subtle);
            background: var(--bg-glass);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .theme-toggle:hover {
            background: var(--bg-glass-hover);
            color: var(--text-primary);
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-3deg); }
            50% { transform: translateY(-15px) rotate(3deg); }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">☀️</button>
    <div class="error-container">
        <div class="error-code">404</div>
        <div class="card-animation"><div class="chip"></div></div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-message">
            The page you're looking for doesn't exist or has been moved.
            Let's get you back to generating test cards.
        </p>
        <a href="/" class="back-btn">
            <span>⚡</span> Back to CC-GEN
        </a>
    </div>
    <script>
        // Sync theme with main page
        (function() {
            const saved = localStorage.getItem('ccgen-theme');
            const theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
            updateBtn();

            document.getElementById('theme-toggle').addEventListener('click', function() {
                const current = document.documentElement.getAttribute('data-theme');
                const next = current === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('ccgen-theme', next);
                updateBtn();
            });

            function updateBtn() {
                const btn = document.getElementById('theme-toggle');
                const t = document.documentElement.getAttribute('data-theme');
                btn.textContent = t === 'dark' ? '\u2600\ufe0f' : '\ud83c\udf19';
            }
        })();
    </script>
</body>
</html>
